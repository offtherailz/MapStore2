name: Backport merged pull request
on:
  pull_request_target:
    types: [closed, labeled]
permissions:
  contents: write # so it can comment
  pull-requests: write # so it can create pull requests
jobs:
  backport:
    name: Backport pull request
    runs-on: ubuntu-latest
    # Don't run on closed unmerged pull requests
    if: >
      github.event.pull_request.merged
      && (
        github.event.action == 'closed'
        || (
          github.event.action == 'labeled'
          && contains(github.event.label.name, 'backport')
        )
      )
    steps:
      - uses: actions/checkout@v4
      - name: Get issues
        id: get-issues
        uses: mondeja/pr-linked-issues-action@v2
      - name: Debug linked issues output
        run: echo "Linked issues: ${{ steps.get-issues.outputs.issues }}"
      - name: Create backport pull requests
        id: create_backport_pr
        uses: korthout/backport-action@v4
        with:
          # Token for git actions, see https://github.com/korthout/backport-action/issues/379
          auto_merge_method: squash
          auto_merge_enabled: true
          copy_assignees: true
          copy_milestone: true
          copy_requested_reviewers: true
          add_labels: Backport
          pull_description: |-
            # Description
            Backport of #${pull_number} to `${target_branch}`.

            Fixes #${{ steps.get-issues.outputs.issues }}

          experimental: >
            {
              "conflict_resolution": "draft_commit_conflicts"
            }
      - name: Link backport PR to original issue
        if: ${{ steps.get-issues.outputs.issues != '' && steps.create_backport_pr.outputs.pull_number != '' }}
        run: |
          for issue in $(echo "${{ steps.get-issues.outputs.issues }}" | tr ',' ' '); do
            gh issue develop geosolutions-it/MapStore2#$issue --add-linked-pull-requests geosolutions-it/MapStore2#${{ steps.create_backport_pr.outputs.pull_number }}
          done
      - name: Link all backport PRs to original issue
        if: ${{ steps.get-issues.outputs.issues != '' && steps.create_backport_pr.outputs.created_pull_numbers != '' }}
        run: |
          for pr in $(echo "${{ steps.create_backport_pr.outputs.created_pull_numbers }}"); do
            for issue in $(echo "${{ steps.get-issues.outputs.issues }}" | tr ',' ' '); do
              gh issue develop geosolutions-it/MapStore2#$issue --add-linked-pull-requests geosolutions-it/MapStore2#$pr
            done
          done
