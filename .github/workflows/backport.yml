name: Backport merged pull request
on:
  pull_request_target:
    types: [closed, labeled]
permissions:
  contents: write # so it can comment
  pull-requests: write # so it can create pull requests
  issues: write # so it can read and update issues

jobs:
  backport:
    name: Backport pull request
    runs-on: ubuntu-latest
    # Don't run on closed unmerged pull requests
    if: >
      github.event.pull_request.merged
      && (
        github.event.action == 'closed'
        || (
          github.event.action == 'labeled'
          && contains(github.event.label.name, 'backport')
        )
      )
    steps:
      - uses: actions/checkout@v4
      - name: Get issues
        id: get-issues
        uses: mondeja/pr-linked-issues-action@v2
      - name: Create backport pull requests
        id: create_backport_pr
        uses: korthout/backport-action@v4
        with:
          # Token for git actions, see https://github.com/korthout/backport-action/issues/379
          auto_merge_method: squash
          auto_merge_enabled: true
          copy_assignees: true
          copy_milestone: true
          copy_requested_reviewers: true
          add_labels: Backport
          pull_description: |-
            # Description
            Backport of #${pull_number} to `${target_branch}`.

            Fixes #${{ steps.get-issues.outputs.issues }}

          experimental: >
            {
              "conflict_resolution": "draft_commit_conflicts"
            }
      - name: Comment backport PRs on original issues
        if: ${{ steps.get-issues.outputs.issues != '' && steps.create_backport_pr.outputs.created_pull_numbers != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumbers = "${{ steps.get-issues.outputs.issues }}".split(',').map(s => s.trim()).filter(Boolean);
            const prNumbers = "${{ steps.create_backport_pr.outputs.created_pull_numbers }}".split(' ').map(s => s.trim()).filter(Boolean);

            const prList = prNumbers.map(n => `- [ ] #${n}`).join('\n');
            const section = `\n\n### Backport PRs for #${{ github.event.pull_request.number }}\n${prList}`;

            for (const issueNumber of issueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber)
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: (issue.body || '') + section
              });
            }
